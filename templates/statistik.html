<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Statistik Warga</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container mt-4">

  <div class="mb-3 text-center">
    <a href="/dashboard" class="btn btn-primary">🏠 Dashboard</a>
    <a href="/warga" class="btn btn-success">👥 Data Warga</a>
  </div>

  <div class="text-center mb-4">
    <h3>Statistik Warga Kp Pasir Luhur</h3>
  </div>

  <div class="card mb-4">
  <div class="card-body text-center">
    <h5>Distribusi Gender</h5>
    <div style="max-width:300px; margin:auto;">
      <canvas id="genderChart" style="height:200px;"></canvas>
    </div>
  </div>
</div>

<div class="card mb-4">
  <div class="card-body text-center">
    <h5>Distribusi Pendidikan</h5>
    <div style="max-width:400px; margin:auto;">
      <canvas id="pendidikanChart" style="height:220px;"></canvas>
    </div>
  </div>
</div>

<div class="card mb-4">
  <div class="card-body text-center">
    <h5>Distribusi Usia</h5>
    <div style="max-width:500px; margin:auto;">
      <canvas id="usiaChart" style="height:240px;"></canvas>
    </div>
  </div>
</div>

</div>

<script>
  new Chart(document.getElementById('genderChart'), {
    type: 'pie',
    data: {
      labels: ['Laki-Laki', 'Perempuan'],
      datasets: [{
        data: [{{ laki|default(0) }}, {{ perempuan|default(0) }}],
        backgroundColor: ['#28a745', '#dc3545']
      }]
    }
  });

  new Chart(document.getElementById('pendidikanChart'), {
    type: 'bar',
    data: {
      labels: ['SD', 'SMP', 'SMA'],
      datasets: [{
        label: 'Jumlah',
        data: [{{ sd|default(0) }}, {{ smp|default(0) }}, {{ sma|default(0) }}],
        backgroundColor: ['#007bff', '#17a2b8', '#ffc107']
      }]
    }
  });

  new Chart(document.getElementById('usiaChart'), {
    type: 'line',
    data: {
      labels: ['Anak-anak (0-12)', 'Remaja (13-19)', 'Dewasa (20-59)', 'Lansia (60+)'],
      datasets: [{
        label: 'Jumlah',
        data: [{{ anak|default(0) }}, {{ remaja|default(0) }}, {{ dewasa|default(0) }}, {{ lansia|default(0) }}],
        borderColor: '#007bff',
        backgroundColor: 'rgba(0,123,255,0.2)',
        tension: 0.3,
        fill: true
      }]
    }
  });
</script>

</body>
</html>
